<!DOCTYPE html>
<html lang="es-ARG">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>who's the killer?</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="module" src="./js/main.js" defer></script>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="contenedor">
        <h1 id="titulo"> Bienvenido al juego</h1>
        <p>selecciona una de las siguientes opciones</p> 
        <div class="menu">
            <button type="button" class="btn btn-primary" id="botonJugar" onclick="inicioJuego()">Comenzar a Jugar</button>
            <button type="button" class="btn btn-primary" id="botonMarcador" onclick="verMarcador()">Ver ultimos ganadores</button>
            <button type="button" class="btn btn-primary" id="botonEditar" onclick="editarJuego()">Editar Juego</button>
            <button type="button" class="btn btn-primary" id="botonJugadores" onclick="agregarJugadores()">Agregar Jugadores</button>
            <button type="button" class="btn btn-primary" id="botonAgregarCategorias" onclick="agregarCategorias()">Agregar Categoria</button>
            <button type="button" class="btn btn-primary" id="botonAgregarItem" onclick="agregarItem()">Agregar Item</button>
        </div>
    </div>
    
</body>
</html>
